spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true  # 기존 DB를 V0 baseline으로 인식 후 V1부터 적용
    baseline-version: 0

cors:
  allowed-origins:
    - ${FRONTEND_URL}

oauth2:
  redirect-uri: ${FRONTEND_URL}/oauth2/callback

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.soaengry.geekyard: INFO
