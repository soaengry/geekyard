version: "3.8"

services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/soaengry/geekyard-backend:latest}
    container_name: geekyard-production
    restart: unless-stopped
    env_file: .env.production
    environment:
      - SPRING_PROFILES_ACTIVE=production
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - geekyard
    deploy:
      resources:
        limits:
          memory: 2048M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    container_name: geekyard-nginx-production
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - geekyard
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  geekyard:
    driver: bridge
