version: "3.8"

services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/soaengry/geekyard-backend:staging}
    container_name: geekyard-staging
    restart: unless-stopped
    env_file: .env.staging
    environment:
      - SPRING_PROFILES_ACTIVE=staging
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - geekyard
    deploy:
      resources:
        limits:
          memory: 1024M

  nginx:
    image: nginx:1.25-alpine
    container_name: geekyard-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - geekyard

networks:
  geekyard:
    driver: bridge
